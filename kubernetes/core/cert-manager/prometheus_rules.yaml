# kubernetes/core/cert-manager/prometheus_rules.yaml
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-prometheus-rules
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  targetNamespace: cert-manager
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: cert-manager
      namespace: flux-system
    - name: kube-prometheus-stack-crds
      namespace: flux-system
  values:
    resources:
      - apiVersion: monitoring.coreos.com/v1
        kind: PrometheusRule
        metadata:
          name: cert-manager-challenge-rules
          namespace: cert-manager
          labels:
            prometheus: k8s
            role: alert-rules
        spec:
          groups:
            - name: certmanager.challenges
              rules:
                - alert: CertmanagerChallengeTimeout
                  expr: |
                    certmanager_certificate_challenge_status{status=~"pending|processing|ready"} == 1
                  for: 15m
                  labels:
                    severity: warning
                  annotations:
                    summary: >-
                      {{ $labels.type }} challenge {{ $labels.name }} for {{ $labels.domain }} not ready >15min
                    description: >-
                      The {{ $labels.type }} challenge {{ $labels.name }} for domain
                      {{ $labels.domain }} has been processing for more than 15 minutes.
                - alert: CertmanagerChallengeError
                  expr: |
                    certmanager_certificate_challenge_status{status=~"errored|expired|invalid|revoked"} == 1
                  labels:
                    severity: critical
                  annotations:
                    summary: >-
                      {{ $labels.type }} challenge {{ $labels.name }} for {{ $labels.domain }} status {{ $labels.status }}
                    description: >-
                      The {{ $labels.type }} challenge {{ $labels.name }} for domain
                      {{ $labels.domain }} has status {{ $labels.status }}.