---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name openbao
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: openbao
      version: 0.28.4
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: openbao
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    injector:
      enabled: false
    server:
      image:
        repository: openbao/openbao-hsm
        tag: 2.5.4@sha256:f8c894a0c14a6dc26df33e16fc335de7abc5f9ccb8273962d140e2a512bf2bce
      updateStrategyType: RollingUpdate
      logLevel: info
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
      statefulSet:
        securityContext:
          pod:
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
          container:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      dataStorage:
        storageClass: "${STORAGE_READWRITEONCE}"
      ha:
        enabled: true
        replicas: 1
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true

            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
            }

            seal "pkcs11" {
              lib = "/tmp/softhsm-root/usr/lib/softhsm/libsofthsm2.so"
              token_label = "OpenBao"
              pin = "env://BAO_HSM_PIN"
              key_label = "bao-root-key-rsa"
              mechanism = "RSA_PKCS_OAEP"
              rsa_oaep_hash = "sha1"
            }

            storage "raft" {
              path = "/openbao/data"
            }

            service_registration "kubernetes" {}
      readinessProbe:
        path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
      livenessProbe:
        enabled: true
        path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
      extraInitContainers:
        - name: bootstrap-softhsm
          image: quay.io/openbao/openbao-hsm:2.5.5@sha256:552db056b497229e6e360e949c003fa4da537c359ec3262ceca8c241fc14a6df
          imagePullPolicy: IfNotPresent
          env:
            - name: SOFTHSM2_CONF
              value: /tmp/softhsm2.conf
            - name: SOFTHSM_SO_PIN
              valueFrom:
                secretKeyRef:
                  name: openbao-softhsm
                  key: softhsm-so-pin
            - name: BAO_HSM_PIN
              valueFrom:
                secretKeyRef:
                  name: openbao-softhsm
                  key: softhsm-user-pin
          command:
            - /bin/sh
            - -ec
            - |
              export SOFTHSM_ROOT=/tmp/softhsm-root
              export PATH="$SOFTHSM_ROOT/usr/bin:$PATH"
              export LD_LIBRARY_PATH="$SOFTHSM_ROOT/usr/lib"

              mkdir -p /tmp/softhsm-apks "$SOFTHSM_ROOT" /var/lib/softhsm/tokens
              for package in \
                libgcc-15.2.0-r2 \
                libstdc++-15.2.0-r2 \
                opensc-0.26.1-r0 \
                softhsm-2.6.1-r6 \
                sqlite-libs-3.51.2-r0; do
                repo=main
                case "$package" in
                  opensc-*) repo=community ;;
                esac
                wget -q -O "/tmp/softhsm-apks/$package.apk" "https://dl-cdn.alpinelinux.org/alpine/v3.23/$repo/x86_64/$package.apk"
              done

              for package in /tmp/softhsm-apks/*.apk; do
                tar -xzf "$package" -C "$SOFTHSM_ROOT"
              done

              install -d -m 1777 /var/lib/softhsm/tokens
              cat > /tmp/softhsm2.conf <<'EOF'
              directories.tokendir = /var/lib/softhsm/tokens
              objectstore.backend = file
              log.level = ERROR
              slots.removable = false
              slots.mechanisms = ALL
              library.reset_on_fork = false
              EOF

              if ! softhsm2-util --module /tmp/softhsm-root/usr/lib/softhsm/libsofthsm2.so --show-slots | grep -q 'Label:[[:space:]]*OpenBao'; then
                softhsm2-util --module /tmp/softhsm-root/usr/lib/softhsm/libsofthsm2.so --init-token --free --label OpenBao --so-pin "$SOFTHSM_SO_PIN" --pin "$BAO_HSM_PIN"
              fi

              if ! pkcs11-tool --module /tmp/softhsm-root/usr/lib/softhsm/libsofthsm2.so --token-label OpenBao --pin "$BAO_HSM_PIN" --list-objects | grep -q 'label:[[:space:]]*bao-root-key-rsa'; then
                pkcs11-tool --module /tmp/softhsm-root/usr/lib/softhsm/libsofthsm2.so --token-label OpenBao --pin "$BAO_HSM_PIN" --keypairgen --key-type rsa:4096 --label bao-root-key-rsa
              fi

          volumeMounts:
            - name: softhsm
              mountPath: /var/lib/softhsm
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      extraSecretEnvironmentVars:
        - envName: BAO_HSM_PIN
          secretName: openbao-softhsm
          secretKey: softhsm-user-pin
      extraEnvironmentVars:
        LD_LIBRARY_PATH: /tmp/softhsm-root/usr/lib
        SOFTHSM2_CONF: /tmp/softhsm2.conf
      volumes:
        - name: tmp
          emptyDir: {}
        - name: softhsm
          persistentVolumeClaim:
            claimName: openbao-softhsm
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: softhsm
          mountPath: /var/lib/softhsm
      ingress:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "openbao.${SECRET_DEFAULT_DOMAIN}"
        tls:
          - hosts:
              - *host
            secretName: "${SECRET_DEFAULT_DOMAIN_CERT}"
      networkPolicy:
        enabled: true
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: haproxy-controller
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: kubernetes-ingress
            ports:
              - port: 8200
                protocol: TCP
          - from:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: openbao
                    app.kubernetes.io/instance: openbao-openbao
                    component: server
            ports:
              - port: 8200
                protocol: TCP
              - port: 8201
                protocol: TCP
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    k8s-app: kube-dns
            ports:
              - port: 53
                protocol: UDP
          - to:
              - podSelector:
                  matchLabels:
                      app.kubernetes.io/name: openbao
                      app.kubernetes.io/instance: openbao-openbao
                      component: server
            ports:
              - port: 8200
                protocol: TCP
              - port: 8201
                protocol: TCP
    ui:
      enabled: true
      activeOpenbaoPodOnly: true
