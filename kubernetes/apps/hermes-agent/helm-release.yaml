---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: hermes-agent
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    global:
      createDefaultServiceAccount: false
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      hermes-agent:
        containers:
          hermes-agent:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.16@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
            args: ["gateway", "run"]
            env:
              TZ: "${TIMEZONE}"
              HERMES_DASHBOARD: "1"
              SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: LITELLM_API_KEY
              SIGNAL_HTTP_URL: "http://signal-cli.signal-cli.svc.cluster.local:8080"
              SIGNAL_ACCOUNT:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: SIGNAL_ACCOUNT
              SIGNAL_GROUP_ALLOWED_USERS:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: SIGNAL_GROUP_ALLOWED_USERS
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 9119
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi
    service:
      hermes-agent:
        controller: *name
        ports:
          http:
            port: *port
    ingress:
      hermes-agent:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "hermes-agent.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: hermes-agent
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      opt:
        enabled: true
        existingClaim: hermes-agent
        globalMounts:
          - path: /opt/data
      tmp:
        enabled: true
        type: emptyDir
    networkpolicies:
      hermes-agent:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: litellm
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: litellm
                      app.kubernetes.io/instance: litellm-litellm
                      app.kubernetes.io/name: litellm-litellm
              ports:
                - port: 4000
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: searxng
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: searxng
                      app.kubernetes.io/instance: searxng-searxng
                      app.kubernetes.io/name: searxng-searxng
              ports:
                - port: 8080
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: signal-cli
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: signal-cli
                      app.kubernetes.io/instance: signal-cli-signal-cli
                      app.kubernetes.io/name: signal-cli-signal-cli
              ports:
                - port: 8080
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: forgejo
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/instance: forgejo-forgejo
                      app.kubernetes.io/name: forgejo
              ports:
                - port: 22
                  protocol: TCP
                - port: 2222
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: ha-mcp
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: ha-mcp
                      app.kubernetes.io/instance: ha-mcp-ha-mcp
                      app.kubernetes.io/name: ha-mcp-ha-mcp
              ports:
                - port: 8086
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      prometheus: kube-prom
                      app.kubernetes.io/instance: kube-prom
                      app.kubernetes.io/managed-by: prometheus-operator
                      app.kubernetes.io/name: prometheus
              ports:
                - port: 9090
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      alertmanager: kube-prom
                      app.kubernetes.io/instance: kube-prom
                      app.kubernetes.io/managed-by: prometheus-operator
                      app.kubernetes.io/name: alertmanager
              ports:
                - port: 9093
                  protocol: TCP
            - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              ports:
                - port: 443
                  protocol: TCP
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port
