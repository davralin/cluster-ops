---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: hermes-agent
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    global:
      createDefaultServiceAccount: true
    serviceAccount:
      hermes-agent: {}
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups:
          - 999 # Signal-cli
    controllers:
      hermes-agent:
        containers:
          hermes-agent:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
            args: ["gateway", "run"]
            env:
              TZ: "${TIMEZONE}"
              HERMES_DASHBOARD: "1"
              SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: LITELLM_API_KEY
              SIGNAL_HTTP_URL: "http://hermes-signal.hermes-agent.svc.cluster.local:8080"
              SIGNAL_ACCOUNT:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: SIGNAL_ACCOUNT
              SIGNAL_GROUP_ALLOWED_USERS:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: SIGNAL_GROUP_ALLOWED_USERS
              HASS_URL: "https://home.${SECRET_DEFAULT_DOMAIN}"
              HASS_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: hermes-agent-secret
                    key: HASS_TOKEN
              # S6 is the worst pile of crap ever invented.
              S6_READ_ONLY_ROOT: "1"
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 9119
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi
    service:
      hermes-agent:
        controller: *name
        ports:
          http:
            port: *port
    ingress:
      hermes-agent:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "hermes-agent.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: hermes-agent
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      opt:
        enabled: true
        existingClaim: hermes-agent
        globalMounts:
          - path: /opt/data
      shared:
        enabled: true
        existingClaim: shared
      tmp:
        enabled: true
        type: emptyDir
      run:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /run
    networkpolicies:
      hermes-agent:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: litellm
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: litellm
                      app.kubernetes.io/instance: litellm-litellm
                      app.kubernetes.io/name: litellm-litellm
              ports:
                - port: 4000
                  protocol: TCP

            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: searxng
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: searxng
                      app.kubernetes.io/instance: searxng-searxng
                      app.kubernetes.io/name: searxng-searxng
              ports:
                - port: 8080
                  protocol: TCP
            - to:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: hermes-signal
                      app.kubernetes.io/instance: hermes-agent-hermes-signal
                      app.kubernetes.io/name: hermes-agent-hermes-signal
              ports:
                - port: 8080
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: forgejo
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/instance: forgejo-forgejo
                      app.kubernetes.io/name: forgejo
              ports:
                - port: 22
                  protocol: TCP
                - port: 2222
                  protocol: TCP
            - to: # Direct Home Assistant access
                - ipBlock:
                    cidr: 10.0.1.79/32
              ports:
                - port: 443
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      prometheus: kube-prom
                      app.kubernetes.io/instance: kube-prom
                      app.kubernetes.io/managed-by: prometheus-operator
                      app.kubernetes.io/name: prometheus
              ports:
                - port: 9090
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      alertmanager: kube-prom
                      app.kubernetes.io/instance: kube-prom
                      app.kubernetes.io/managed-by: prometheus-operator
                      app.kubernetes.io/name: alertmanager
              ports:
                - port: 9093
                  protocol: TCP
            - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              ports:
                - port: 443
                  protocol: TCP
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port
    rbac:
      roles:
        hermes-agent:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list", "delete"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
      bindings:
        hermes-agent:
          type: RoleBinding
          roleRef:
            identifier: hermes-agent
          subjects:
            - identifier: hermes-agent
    rawResources:
      cilium-kube-api:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            egress:
              - toEntities:
                  - kube-apiserver
                toPorts:
                  - ports:
                      - port: "6443"
                        protocol: TCP
