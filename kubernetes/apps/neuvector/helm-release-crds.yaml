---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector-crds
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: crd
      version: 2.10.3
      sourceRef:
        kind: HelmRepository
        name: neuvector-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: neuvector
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
