---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kubevirt
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: kubevirt
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: kubevirt
spec:
  podSelector:
    matchLabels:
      prometheus.kubevirt.io: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8443
          protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: virt-operator
  namespace: kubevirt
spec:
  endpointSelector:
    matchLabels:
      kubevirt.io: virt-operator
  egress:
    - toEntities:
        - kube-apiserver
  ingress:
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: virt-api
  namespace: kubevirt
spec:
  endpointSelector:
    matchLabels:
      kubevirt.io: virt-api
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubevirt
            kubevirt.io: virt-handler
      toPorts:
        - ports:
            - port: "8186"
              protocol: TCP
  ingress:
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: virt-controller
  namespace: kubevirt
spec:
  endpointSelector:
    matchLabels:
      kubevirt.io: virt-controller
  egress:
    - toEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: virt-handler
  namespace: kubevirt
spec:
  endpointSelector:
    matchLabels:
      kubevirt.io: virt-handler
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubevirt
            kubevirt.io: virt-handler
  ingress:
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "8186"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubevirt
            kubevirt.io: virt-api
      toPorts:
        - ports:
            - port: "8186"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubevirt
            kubevirt.io: virt-handler
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: virt-operator-strategy-dumper
  namespace: kubevirt
spec:
  endpointSelector:
    matchLabels:
      kubevirt.io: virt-operator-strategy-dumper
  egress:
    - toEntities:
        - kube-apiserver
---
