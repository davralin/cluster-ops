apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: vms
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-migration
  namespace: vms
spec:
  podSelector:
    matchLabels:
      kubevirt.io: virt-launcher
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              kubevirt.io: virt-launcher
      ports:
        - port: 49152
          protocol: TCP
        - port: 49153
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              kubevirt.io: virt-launcher
      ports:
        - port: 49152
          protocol: TCP
        - port: 49153
          protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apt-egress
  namespace: vms
spec:
  endpointSelector:
    matchLabels:
      vm.kubevirt.io/os: debian
  egress:
    - toCIDRSet:
        - cidr: 10.96.0.10/32
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*.debian.org"
    - toFQDNs:
        - matchPattern: "*.debian.org"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-importer-egress
  namespace: vms
spec:
  endpointSelector:
    matchLabels:
      cdi.kubevirt.io: importer
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
