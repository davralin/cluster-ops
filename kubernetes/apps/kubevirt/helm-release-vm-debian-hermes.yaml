---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name vm-debian-hermes
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: &namespace vms
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 10
  upgrade:
    timeout: 10m
    remediation:
      retries: 10
  dependsOn:
    - name: kubevirt-cr
      namespace: flux-system
    - name: cdi-cr
      namespace: flux-system
  values:
    resources:
      - apiVersion: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        metadata:
          name: &vmname debian-hermes
          namespace: *namespace
        spec:
          storage:
            accessModes:
              - ReadWriteMany
            volumeMode: Block
            storageClassName: ceph-block
            resources:
              requests:
                storage: 30Gi
          source:
            http:
              url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
      - apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: *vmname
          namespace: *namespace
        spec:
          runStrategy: Always
          dataVolumeTemplates: []
          template:
            metadata:
              labels:
                kubevirt.io/domain: *vmname
                vm.kubevirt.io/os: debian
            spec:
              evictionStrategy: LiveMigrate
              domain:
                machine:
                  type: q35
                features:
                  smm:
                    enabled: true       # Required for Secure Boot
                firmware:
                  bootloader:
                    efi:
                      persistent: true  # Persist OVMF NVRAM to RWX PVC
                      # secureBoot defaults to true when efi: is set
                cpu:
                  cores: 2
                memory:
                  guest: 4Gi
                devices:
                  tpm: {}
                  disks:
                    - name: rootdisk
                      disk:
                        bus: virtio
                    - name: cloudinitdisk
                      disk:
                        bus: virtio
                  interfaces:
                    - name: default
                      macAddress: 3a:85:d3:23:b9:49
                      masquerade: {}
              networks:
                - name: default
                  pod:
                    vmNetworkCIDR: 192.168.200.0/24
              volumes:
                - name: rootdisk
                  dataVolume:
                    name: *vmname
                - name: cloudinitdisk
                  cloudInitNoCloud:
                    userData: |
                      #cloud-config
                      packages:
                        - qemu-guest-agent
                      users:
                        - name: root
                          lock_passwd: true
                          ssh_authorized_keys:
                            - ssh-rsa  cardno:000608670554
                      runcmd:
                        - systemctl enable --now qemu-guest-agent
      - apiVersion: v1
        kind: Service
        metadata:
          name: debian-hermes-ssh
          namespace: *namespace
        spec:
          type: LoadBalancer
          selector:
            kubevirt.io/domain: *vmname
          ports:
            - name: ssh
              port: 22
              targetPort: 22
              protocol: TCP
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-ssh-ingress
          namespace: vms
        spec:
          podSelector:
            matchLabels:
              kubevirt.io/domain: *vmname
          policyTypes:
            - Ingress
          ingress:
            - ports:
                - port: 22
                  protocol: TCP
