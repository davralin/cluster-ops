---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name kubevirt-cr
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: kubevirt
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: kubevirt-operator
      namespace: flux-system
  values:
    resources:
      - apiVersion: kubevirt.io/v1
        kind: KubeVirt
        metadata:
          name: kubevirt
          namespace: kubevirt
        spec:
          certificateRotateStrategy: {}
          customizeComponents: {}
          imagePullPolicy: IfNotPresent
          configuration:
            imagePullPolicy: IfNotPresent
            # RWX storage for UEFI NVRAM PVCs — required for live migration with persistent EFI
            vmStateStorageClass: ceph-filesystem
            developerConfiguration:
              featureGates: []  # VMPersistentState is GA in v1.8.2 — always on, no gate needed
            migrations:
              # Tuned for 1 GbE inter-node links (5x Dell Optiplex 3090 Micro)
              parallelMigrationsPerCluster: 2
              parallelOutboundMigrationsPerNode: 1
              bandwidthPerMigration: 64Mi
              allowAutoConverge: true
          workloadUpdateStrategy:
            workloadUpdateMethods:
              - LiveMigrate
          # KubeVirt creates ServiceMonitors in monitorNamespace when these are set
          monitorNamespace: monitoring
          monitorAccount: kube-prom-prometheus
          serviceMonitorNamespace: kubevirt
