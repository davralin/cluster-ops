---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name cdi-cr
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: cdi
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: cdi-operator
      namespace: flux-system
  values:
    resources:
      - apiVersion: cdi.kubevirt.io/v1beta1
        kind: CDI
        metadata:
          name: cdi
        spec:
          imagePullPolicy: IfNotPresent
          infra:
            nodeSelector:
              kubernetes.io/os: linux
          workload:
            nodeSelector:
              kubernetes.io/os: linux
          config:
            featureGates:
              - HonorWaitForFirstConsumer
              - WebhookPvcRendering
            # CDI importer scratch space — use ceph-block (no local-path-provisioner needed)
            scratchSpaceStorageClass: ceph-block
            podResourceRequirements:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
