---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name paperless-gpt
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: paperless-ngx
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        # level=fatal msg="Failed to create default settings file: mkdir config: permission denied"
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
    controllers:
      paperless-gpt:
        containers:
          paperless-gpt:
            image:
              repository: ghcr.io/icereed/paperless-gpt
              tag: v0.25.1@sha256:c0ce6186028911101a2cfe68353f14a9dbb2653596f3f1cff94de4b6db3114ff
            env:
              PAPERLESS_BASE_URL: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
              PAPERLESS_PUBLIC_URL: "https://paperless-ngx.${SECRET_DEFAULT_DOMAIN}"
              VISION_LLM_PROVIDER: "ollama"
              VISION_LLM_MODEL: "minicpm-v:8b"
              LLM_PROVIDER: "ollama"
              LLM_MODEL: "qwen3:8b"
              OLLAMA_HOST: "http://ollama.ollama.svc.cluster.local:11434"
              PAPERLESS_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: paperless-secrets
                    key: paperless-api-token
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              # level=fatal msg="Failed to create default settings file: mkdir config: read-only file system"
              readOnlyRootFilesystem: false
              #capabilities:
              #  add:
              #    - CHOWN
              #    - SETGID
              #    - SETUID
              #  drop:
              #    - ALL
            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                memory: 200Mi
    service:
      paperless-gpt:
        controller: *name
        ports:
          http:
            port: &port 8080
    ingress:
      paperless-gpt:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "SAMEORIGIN"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "paperless-gpt.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: paperless-gpt
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /app/prompts
    networkpolicies:
      paperless-gpt:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/name: paperless-ngx-paperless-ngx
              ports:
                - port: 8000
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: ollama
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: ollama
                      app.kubernetes.io/instance: ollama-ollama
                      app.kubernetes.io/name: ollama-ollama
              ports:
                - port: 11434
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port