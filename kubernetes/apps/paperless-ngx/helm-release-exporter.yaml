---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name paperless-ngx-exporter
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: paperless-ngx
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: true
    serviceAccount:
      paperless-ngx-exporter: {}
    defaultPodOptions:
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      paperless-ngx-exporter:
        type: cronjob
        cronjob:
          schedule: "05 */6 * * *"
          timeZone: "${TIMEZONE}"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          exporter:
            image:
              repository: registry.k8s.io/kubectl
              tag: v1.36.2@sha256:b0d792e0d8dfb9bb1b922b78b23137e2a34bb6f9667640353a9d2aadd1fd7761
            command:
              - /bin/kubectl
            args:
              - -n
              - paperless-ngx
              - exec
              - deploy/paperless-ngx
              - -c
              - paperless-ngx
              - --
              - document_exporter
              - /export/backup
              - -d
              - -f
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    networkpolicies:
      exporter:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          ingress: []
    rbac:
      roles:
        exporter:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get"]
      bindings:
        exporter:
          type: RoleBinding
          roleRef:
            identifier: exporter
          subjects:
            - identifier: paperless-ngx-exporter
    rawResources:
      exporter-kube-api:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            egress:
              - toEntities:
                  - kube-apiserver
                toPorts:
                  - ports:
                      - port: "6443"
                        protocol: TCP
