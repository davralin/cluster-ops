---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name paperless-ngx-postgres-v18
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: &namespace paperless-ngx
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: cloudnative-pg
      namespace: flux-system
  values:
    resources:
      - apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: *name
          namespace: *namespace
        spec:
          # using only 1 replica: very difficult to drain the node where postgres is running
          # using more than 1 replica: write amplification issues when leveraging replicated storage (e.g. ceph)
          instances: 2
          affinity:
            enablePodAntiAffinity: true
            topologyKey: kubernetes.io/hostname
            podAntiAffinityType: required
          imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:b38bee8f92acd6d7276d5be32e9af36a0ea72c9d339945f1ae205a2acc3cbb89
          primaryUpdateStrategy: unsupervised
          storage:
            size: 2Gi
            storageClass: "${STORAGE_READWRITEONCE}"
          #walStorage:
          #  size: 2Gi
          #  storageClass: "${STORAGE_READWRITEONCE}"
          managed:
            roles:
              - name: paperless-ngx
                login: true
                passwordSecret:
                  name: paperless-ngx-basic-auth
          superuserSecret:
            name: *name
          bootstrap:
            # https://docs.paperless-ngx.com/administration/#importer
            # The importer should be run against a completely empty installation (database and directories) of Paperless-ngx.
            # use this to start a new cluster
            initdb:
              database: paperless-ngx
              owner: paperless-ngx
              secret:
                name: paperless-ngx-basic-auth
            # use this to recover a net-new cluster from a backup
            #recovery:
            #  source: *name
            #  database: paperless-ngx
            #  owner: paperless-ngx
            # # use this to 'migrate' from an existing cnpg cluster (e.g. "paperless-ngx-postgres-v17") to the new cluster
            #initdb:
            #  database: paperless-ngx
            #  owner: paperless-ngx
            #  import:
            #    type: microservice
            #    databases:
            #      - paperless-ngx
            #    source:
            #      externalCluster: paperless-ngx-postgres-v17
          monitoring:
            enablePodMonitor: "${MONITORING_PROMETHEUS}"
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
          # Backups are intentionally handled by paperless document_exporter + Borgmatic.
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: *name
          namespace: *namespace
        spec:
          podSelector:
            matchLabels:
              cnpg.io/cluster: *name
          policyTypes:
            - Ingress
            - Egress
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
                - podSelector:
                    matchLabels:
                      cnpg.io/jobRole: import
                      app.kubernetes.io/name: postgresql
                      app.kubernetes.io/component: database
                      app.kubernetes.io/managed-by: cloudnative-pg
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: paperless-ngx
                      app.kubernetes.io/instance: paperless-ngx-paperless-ngx
                      app.kubernetes.io/name: paperless-ngx-paperless-ngx
              ports:
                - port: 5432
                  protocol: TCP
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: cloudnative-pg
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: cloudnative-pg
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
              ports:
                - port: 8000
                  protocol: TCP
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: prometheus
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
              ports:
                - port: 9187
          egress:
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
              ports:
                - port: 5432
                  protocol: TCP
                - port: 8000
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: *name
          namespace: *namespace
        spec:
          endpointSelector:
            matchLabels:
              cnpg.io/cluster: *name
          egress:
            - toEntities:
              - kube-apiserver
              toPorts:
              - ports:
                - port: "6443"
                  protocol: TCP
