---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name paperless-ngx-daily-to-consume
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: paperless-ngx
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      daily-to-consume:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          schedule: "17 05 * * *"
          timeZone: "${TIMEZONE}"
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          daily-to-consume:
            image:
              repository: ghcr.io/rclone/rclone
              tag: 1.74.4@sha256:c61954aaa32328a5486715dd063a81c7879f5195ad3505cd362deddd509dc4a1
            args: ["--config", "/consume/rclone.conf", "move", "--verbose", "nextcloud:Scans/", "/consume"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    persistence:
      consume:
        enabled: true
        existingClaim: paperless-ngx-consume
    networkpolicies:
      daily-to-consume:
        enabled: true
        controller: daily-to-consume
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: nextcloud
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: nextcloud-nextcloud
              ports:
                - port: 80
                  protocol: TCP
          ingress: []
