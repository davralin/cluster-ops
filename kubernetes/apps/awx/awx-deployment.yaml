---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: awx-deployment
  namespace: awx
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: awx
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: awx-operator
      namespace: flux-system
    - name: awx-postgres-v18
      namespace: flux-system
  values:
    resources:
      - apiVersion: awx.ansible.com/v1beta1
        kind: AWX
        metadata:
          name: awx
          namespace: awx
        spec:
          ee_images:
            - name: personal-awx-ee
              image: ghcr.io/davralin/awx-ee:latest@sha256:394874ebc044f7ccfb9b82bbf2dab4f098340a9c05af31fcb73ee585050b59e5
          extra_settings:
            - setting: TOWER_URL_BASE
              value: '"awx.${SECRET_PRIVATE_DOMAIN}"'
          hostname: "awx.${SECRET_PRIVATE_DOMAIN}"
          ingress_annotations: |
            haproxy-ingress.github.io/allowlist-source-range: "${HAPROXY_WHITELIST}"
            haproxy-ingress.github.io/ssl-redirect: "true"
            haproxy-ingress.github.io/config-backend: |
              http-response set-header Strict-Transport-Security "max-age=31536000"
              http-response set-header X-Frame-Options DENY
              http-response set-header X-Content-Type-Options nosniff
              http-response set-header Referrer-Policy strict-origin-when-cross-origin
          ingress_type: ingress
          ingress_tls_secret: "${SECRET_PRIVATE_DOMAIN_CERT}"
          ipv6_disabled: true
          postgres_configuration_secret: awx-secrets
          replicas: 1