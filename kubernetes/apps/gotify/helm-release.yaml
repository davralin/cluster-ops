---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name gotify
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: gotify
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      gotify:
        containers:
          gotify:
            image:
              repository: ghcr.io/gotify/server
              tag: 3.0.0@sha256:d75e89e0e28389c00c2556afe01282a37ee9756b0285799aa25214243aebd5e5
            env:
              TZ: "${TIMEZONE}"
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 5m
                memory: 50Mi
              limits:
                memory: 150Mi
    service:
      gotify:
        controller: *name
        ports:
          http:
            port: &port 80
    ingress:
      gotify:
        enabled: true
        annotations:
          haproxy-ingress.github.io/allowlist-source-range: "${HAPROXY_WHITELIST}"
          haproxy-ingress.github.io/ssl-redirect: "true"
          haproxy-ingress.github.io/config-backend: |
            http-response set-header Strict-Transport-Security "max-age=31536000"
            http-response set-header X-Frame-Options DENY
            http-response set-header X-Content-Type-Options nosniff
            http-response set-header Referrer-Policy strict-origin-when-cross-origin
        hosts:
          - host: &host "gotify.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: gotify
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      gotify:
        enabled: true
        existingClaim: gotify
        globalMounts:
          - path: /app/data
    networkpolicies:
      gotify:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress: []
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: haproxy-ingress
                - namespaceSelector: {}
              ports:
                - port: *port