---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name minecraft-bedrock-creative
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: minecraft
      version: 5.1.3
      sourceRef:
        kind: HelmRepository
        name: itzg-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: minecraft
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    image:
      repository: ghcr.io/itzg/minecraft-server
    minecraftServer:
      extraPorts:
        - name: geysermc
          containerPort: 25565
          protocol: UDP
          service:
            enabled: true
            embedded: true
            port: 25565
        - name: prometheus
          containerPort: 9100
          protocol: TCP
          service:
            enabled: true
            embedded: true
            port: 9100
      tz: "${TIMEZONE}"
      eula: true
      type: PAPER
      # renovate: datasource=custom.papermc depName=paper versioning=loose
      version: "26.2"
      difficulty: "easy"
      maxPlayers: 4
      levelSeed: 421112feedmekittens
      maxTickTime: -1
      mode: creative
      memory: 6G
      motd: "A Bedrock-Creative Minecraft Server"
      overrideServerProperties: true
      pluginUrls:
        - https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        - https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
        # renovate: datasource=github-releases depName=sladkoff/minecraft-prometheus-exporter
        - https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
        # renovate: datasource=github-releases depName=ViaVersion/ViaVersion
        - https://github.com/ViaVersion/ViaVersion/releases/download/5.11.0/ViaVersion-5.11.0.jar
      rcon:
        enabled: true
      serviceType: LoadBalancer
      loadBalancerIP: 10.0.1.40
      #externalTrafficPolicy: Local
    resources:
      requests:
        memory: 6G
    extraEnv:
      ENABLE_AUTOPAUSE: "FALSE"
      ENFORCE_WHITELIST: "FALSE"
      ALLOW_FLIGHT: "TRUE"
      OPS:
        valueFrom:
          secretKeyRef:
            name: minecraft-secrets
            key: ops
      WHITELIST:
        valueFrom:
          secretKeyRef:
            name: minecraft-secrets
            key: whitelist
    podAnnotations:
      reloader.stakater.com/auto: "true"
    persistence:
      dataDir:
        enabled: true
        existingClaim: bedrock-creative
    mcbackup:
      enabled: true
      image:
        repository: ghcr.io/itzg/mc-backup
        tag: "2026.7.2@sha256:db2bca9a54aac96e8db74be038b920cb549c8e3b3384067251aad5e178dd03cc"
      pauseIfNoPlayers: true
      backupMethod: rclone
      excludes: "*.jar,cache,logs,lost+found"
      rcloneRemote: minecraft-garage
      rcloneDestDir: minecraft-${CLUSTER_NAME}/bedrock-creative
      rcloneConfigExistingSecret: rclone-config
      pruneBackupsDays: 3
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
      persistence:
        backupDir:
          enabled: true
          existingClaim: bedrock-creative-backup
