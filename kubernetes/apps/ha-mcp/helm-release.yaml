---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name ha-mcp
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: ha-mcp
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      ha-mcp:
        containers:
          ha-mcp:
            image:
              repository: ghcr.io/homeassistant-ai/ha-mcp
              tag: 7.5.0@sha256:caf35cccdec9c4b33f9b09d2bc9de6225719d954763c67a73fb0195fb4dcf360
            command:
              - ha-mcp-web
            env:
              TZ: "${TIMEZONE}"
              HOMEASSISTANT_URL: "https://home.${SECRET_DEFAULT_DOMAIN}"
              HOMEASSISTANT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: ha-mcp-config
                    key: HOMEASSISTANT_TOKEN
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 2Gi
    service:
      ha-mcp:
        controller: *name
        ports:
          http:
            port: &port 8086
    persistence:
      tmp:
        type: emptyDir
    networkpolicies:
      ha-mcp:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to: # Talk to Home Assistant
              - ipBlock:
                  cidr: 10.0.1.79/32
              ports:
                - port: 443
                  protocol: TCP
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: hermes-agent
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: hermes-agent
                      app.kubernetes.io/instance: hermes-agent-hermes-agent
                      app.kubernetes.io/name: hermes-agent-hermes-agent
              ports:
                - port: *port
