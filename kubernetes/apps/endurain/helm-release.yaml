---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name endurain
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: endurain
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
    controllers:
      endurain:
        containers:
          endurain:
            image:
              repository: codeberg.org/endurain-project/endurain
              tag: v0.18.3@sha256:c0ae070c2f9c452cbfaee89e9653fe83c09389d0d6594bb103aa4f3cda9b7c81
            env:
              TZ: "${TIMEZONE}"
              ENDURAIN_HOST: "https://endurain.${SECRET_DEFAULT_DOMAIN}"
              BEHIND_PROXY: true
              DB_HOST: endurain-postgres-v18-rw.endurain.svc.cluster.local
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: endurain-config
                    key: DB_PASSWORD
              FERNET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: endurain-config
                    key: FERNET_KEY
              SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: endurain-config
                    key: SECRET_KEY
              UID: 1000
              GID: 1000
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - CHOWN
                  - SETGID
                  - SETUID
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50M
              limits:
                memory: 300M
    service:
      endurain:
        controller: *name
        ports:
          http:
            port: &port 8080
    ingress:
      endurain:
        enabled: true
        annotations:
          haproxy-ingress.github.io/allowlist-source-range: "${HAPROXY_WHITELIST}"
          haproxy-ingress.github.io/ssl-redirect: "true"
          haproxy-ingress.github.io/config-backend: |
            http-response set-header Strict-Transport-Security "max-age=31536000"
            http-response set-header X-Frame-Options DENY
            http-response set-header X-Content-Type-Options nosniff
            http-response set-header Referrer-Policy strict-origin-when-cross-origin
        hosts:
          - host: &host "endurain.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: endurain
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      data:
        enabled: true
        existingClaim: endurain
        globalMounts:
          - path: /app/backend/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /app/backend/logs
    networkpolicies:
      endurain:
        enabled: true
        controller: *name
        policyTypes:
          - Ingress
          - Egress
        rules:
          egress:
            - to: # Needs to connect to Garmin Connect
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                  - "${HAPROXY_WHITELIST}"
              ports:
                - port: 443
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: endurain-postgres-v18
                      cnpg.io/instanceRole: primary
              ports:
                - port: 5432
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: haproxy-ingress
              ports:
                - port: *port
