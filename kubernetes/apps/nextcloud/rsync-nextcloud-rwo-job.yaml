---
apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-rwx-to-rwo-rsync
  namespace: nextcloud
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rsync
          image: ghcr.io/davralin/rsync:latest@sha256:1df79b24c6b4b1cc4d279eea448579f352dec98e4d5c8ee54327ae3841146eec
          command:
            - /usr/bin/sh
          args:
            - -ec
            - |
              set -o pipefail
              /usr/bin/rsync \
                --archive \
                --hard-links \
                --acls \
                --xattrs \
                "--filter=-x security.*" \
                --numeric-ids \
                --delete \
                --info=progress2 \
                --stats \
                /source/ \
                /dest/ \
                2>&1 | /usr/bin/tr '\r' '\n'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
              drop:
                - ALL
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: dest
              mountPath: /dest
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: nextcloud
            readOnly: true
        - name: dest
          persistentVolumeClaim:
            claimName: nextcloud-rwo
