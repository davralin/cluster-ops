---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name nextcloud-utility
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: nextcloud
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      utility:
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - nextcloud-nextcloud
                      - key: app.kubernetes.io/controller
                        operator: In
                        values:
                          - nextcloud
                  topologyKey: kubernetes.io/hostname
        containers:
          utility:
            image:
              repository: ghcr.io/davralin/utility
              tag: latest@sha256:3a73c3bb818a5721346d1702baaba4eb57b54a957e3be6b7a23450da781590ac
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
    persistence:
      source:
        enabled: true
        existingClaim: nextcloud-rwo
      destination:
        enabled: true
        existingClaim: nextcloud
      tmp:
        enabled: true
        type: emptyDir
    networkpolicies:
      utility:
        enabled: true
        controller: utility
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress: []
          ingress: []