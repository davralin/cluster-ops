---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name openclaw
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: openclaw
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      openclaw:
        containers:
          openclaw:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.28@sha256:5900559f795ef15ea2f0b1fc488726d9b27bb2de398424c14d13c9b1f1ff0d66
            env:
              TZ: "${TIMEZONE}"
              OPENCLAW_DISABLE_BONJOUR: 1
              NODE_OPTIONS: "--max-old-space-size=4096"
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GITHUB_TOKEN
              GROQ_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GROQ_API_KEY
              OPENCLAW_GATEWAY_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GATEWAY_PASSWORD
              OPENCLAW_GATEWAY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GATEWAY_TOKEN
              OPENROUTER_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: OPENROUTER_API_KEY
              TELEGRAM_BOT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: TELEGRAM_BOT_TOKEN
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 3Gi
              limits:
                memory: 4Gi
          editor:
            image:
              repository: ghcr.io/davralin/utility
              tag: latest@sha256:79277bcf37aee3713972e33b27bbc835eacdd913679d75f20877527dbd3d5d37
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 100Mi
    service:
      openclaw:
        controller: *name
        ports:
          http:
            port: &port 18789
          json-rpc:
            port: 8080
    ingress:
      openclaw:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "openclaw.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: openclaw
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      config:
        enabled: true
        existingClaim: openclaw
        advancedMounts:
          openclaw:
            editor:
              - path: /opt/openclaw
                subPath: openclaw
            openclaw:
              - path: /home/node
                subPath: openclaw
      tmp:
        enabled: true
        type: emptyDir
    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts", "events"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets"]
              verbs: ["get", "list", "watch"]
        openclaw-write-restricted:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
            - apiGroups: ["batch"]
              resources: ["jobs"]
              verbs: ["delete"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: openclaw-write-restricted
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
    serviceAccount:
      openclaw: {}
    networkpolicies:
      openclaw:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: freshrss
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: freshrss
                      app.kubernetes.io/instance: freshrss-freshrss
                      app.kubernetes.io/name: freshrss-freshrss
              ports:
                - port: 80
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
              ports:
                - port: 9090
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: nextcloud
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: nextcloud
                      app.kubernetes.io/instance: nextcloud-nextcloud
                      app.kubernetes.io/name: nextcloud-nextcloud
              ports:
                - port: 80
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: ollama
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: ollama
                      app.kubernetes.io/instance: ollama-ollama
                      app.kubernetes.io/name: ollama-ollama
              ports:
                - port: 11434
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: searxng
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: searxng
                      app.kubernetes.io/instance: searxng-searxng
                      app.kubernetes.io/name: searxng-searxng
              ports:
                - port: 8080
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: ha-mcp
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: ha-mcp
                      app.kubernetes.io/instance: ha-mcp-ha-mcp
                      app.kubernetes.io/name: ha-mcp-ha-mcp
              ports:
                - port: 8086
                  protocol: TCP
            - to:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: openclaw-sockpuppetbrowser
                      app.kubernetes.io/instance: openclaw-openclaw-sockpuppetbrowser
                      app.kubernetes.io/name: openclaw-openclaw-sockpuppetbrowser
              ports:
                - port: 3000
                  protocol: TCP
            - to: # What could go wrong
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                  - "${HAPROXY_WHITELIST}"
              ports:
                - port: 443
                  protocol: TCP
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port
    rawResources:
      cilium-kube-api:
        apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        spec:
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            egress:
              - toEntities:
                  - kube-apiserver
                toPorts:
                  - ports:
                      - port: "6443"
                        protocol: TCP
