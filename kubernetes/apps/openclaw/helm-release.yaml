---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name openclaw
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: openclaw
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      openclaw:
        containers:
          openclaw:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.13-1@sha256:a5a4c83b773aca85a8ba99cf155f09afa33946c0aa5cc6a9ccb6162738b5da02
            env:
              TZ: "${TIMEZONE}"
              OPENCLAW_DISABLE_BONJOUR: 1
              GROQ_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GROQ_API_KEY
              OPENCLAW_GATEWAY_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GATEWAY_PASSWORD
              OPENCLAW_GATEWAY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secrets
                    key: GATEWAY_TOKEN
            probes:
              liveness: &probes
                enabled: false #true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              #limits:
                #memory: 2Gi
          editor:
            image:
              repository: ghcr.io/davralin/utility
              tag: latest@sha256:c7bb9f4eccefeb4c924065a0acc139711dbe6205487ec3aafd62680474ca9d79
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 100Mi
    service:
      openclaw:
        controller: *name
        ports:
          http:
            port: &port 18789
          json-rpc:
            port: 8080
    ingress:
      openclaw:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "openclaw.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: openclaw
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      config:
        enabled: true
        existingClaim: openclaw
        advancedMounts:
          openclaw:
            editor:
              - path: /opt/openclaw
                subPath: openclaw
            openclaw:
              - path: /home/node
                subPath: openclaw
      tmp:
        enabled: true
        type: emptyDir
    networkpolicies:
      openclaw:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: searxng
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: searxng
                      app.kubernetes.io/instance: searxng-searxng
                      app.kubernetes.io/name: searxng-searxng
              ports:
                - port: 8080
                  protocol: TCP
            - to: # What could go wrong
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                  - "${HAPROXY_WHITELIST}"
              ports:
                - port: 443
                  protocol: TCP
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port