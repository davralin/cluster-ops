---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name pocket-id
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: pocket-id
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: pocket-id-postgres-v18
      namespace: flux-system
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      pocket-id:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          pocket-id:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.11.0@sha256:8457defd3c58d59faf11effa1a682e94c723499930b13a359bf29f5ea0317584
            env:
              TZ: "${TIMEZONE}"
              ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: pocket-id-secret
                    key: ENCRYPTION_KEY
              DB_CONNECTION_STRING:
                valueFrom:
                  secretKeyRef:
                    name: pocket-id-postgres-v18
                    key: DATABASE_URL
              APP_URL: "https://id.${SECRET_DEFAULT_DOMAIN}"
              INTERNAL_APP_URL: "http://pocket-id.pocket-id.svc.cluster.local:8081"
              TRUST_PROXY: "true"
              UI_CONFIG_DISABLED: "true"
              ALLOW_USER_SIGNUPS: "false"
              PORT: "8081"
              FILE_BACKEND: "database"
              ENABLE_EMAIL_VERIFICATION: "false"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /app/pocket-id
                      - healthcheck
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /app/pocket-id
                      - healthcheck
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      pocket-id:
        controller: *name
        primary: true
        ports:
          http:
            port: &port 8081
    ingress:
      pocket-id:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: "id.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: pocket-id
                  port: http
        tls:
          - hosts:
              - "id.${SECRET_DEFAULT_DOMAIN}"
    persistence:
      data:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /app/data
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
    networkpolicies:
      pocket-id:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
                - port: 53
                  protocol: TCP
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: pocket-id-postgres-v18
                      cnpg.io/instanceRole: primary
              ports:
                - port: 5432
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port
            - from:
                - namespaceSelector: {}
              ports:
                - port: *port
