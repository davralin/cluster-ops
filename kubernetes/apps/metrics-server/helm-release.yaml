---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name metrics-server
  namespace: flux-system
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: metrics-server
      version: 3.13.1
      sourceRef:
        kind: HelmRepository
        name: metrics-server-charts
        namespace: flux-system
      interval: 30m
  targetNamespace: metrics-server
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: kube-prometheus-stack-crds
      namespace: flux-system
  values:
    fullnameOverride: *name
    args:
      - --kubelet-insecure-tls
    metrics:
      enabled: "${MONITORING_PROMETHEUS}"
    serviceMonitor:
      enabled: "${MONITORING_PROMETHEUS}"
