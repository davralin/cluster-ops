metadata:
  name: allow-egress-kubescape-scheduler
  namespace: kubescape
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: kubescape-scheduler
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: operator
      ports:
        - port: 4002
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-kubevuln-scheduler
  namespace: kubescape
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: kubevuln-scheduler
  policyTypes:
    - Egress
