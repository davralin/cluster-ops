---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name lfmv
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: media
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      lfmv:
        type: cronjob
        cronjob:
          schedule: "0 6 * * 4"
          concurrencyPolicy: Forbid
        containers:
          lfmv:
            image:
              repository: ghcr.io/davralin/lfmv
              tag: main@sha256:58348f42c9917145937e3bd432e2674b593dff99192331431e2dcec7016e175b
            env:
              LIDARR_URL: "http://lidarr.media.svc.cluster.local:8686"
              LIDARR_API_KEY: "${SECRET_LIDARR_API_KEY}"
              OUTPUT_DIR: "/music-videos"
              IMVDB_API_KEY: "${SECRET_IMVDB_API_KEY}"
              YTDLP_FORMAT: "bestvideo[height<=1080]+bestaudio/best[height<=1080]"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      tmp:
        enabled: true
        type: emptyDir
      media:
        enabled: true
        existingClaim: media
        globalMounts:
          - path: /music-videos
            subPath: video/musicvideos-incoming
    networkpolicies:
      lfmv:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: lidarr
                      app.kubernetes.io/instance: media-lidarr
                      app.kubernetes.io/name: media-lidarr
              ports:
                - port: 8686
            - to: # internet
                - ipBlock:
                    cidr: 0.0.0.0/0
                    except:
                      - "${HAPROXY_WHITELIST}"
              ports:
                - port: 443
                  protocol: TCP
          ingress: []
