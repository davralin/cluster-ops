---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name ersatztv-next
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: media
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    configMaps:
      config:
        data:
          lineup.json: |
            {
              "server": { "bind_address": "0.0.0.0", "port": 8409 },
              "output": { "folder": "/tmp/hls" },
              "channels": [
                { "number": "1", "name": "Music Videos", "config": "/config/channels/1/channel.json" }
              ]
            }
          channel.json: |
            {
              "playout": { "folder": "/config/playout" },
              "ffmpeg": { "ffmpeg_path": "", "ffprobe_path": "", "disabled_filters": [] },
              "normalization": {
                "audio": {
                  "format": "aac",
                  "bitrate_kbps": 192,
                  "buffer_kbps": 384,
                  "channels": 2,
                  "sample_rate_hz": 48000,
                  "normalize_loudness": true,
                  "loudness": { "integrated_target": -16, "range_target": 11, "true_peak": -1.5 }
                },
                "video": {
                  "format": "h264",
                  "bit_depth": 8,
                  "width": 1920,
                  "height": 1080,
                  "bitrate_kbps": 2000,
                  "buffer_kbps": 4000,
                  "accel": "vaapi",
                  "vaapi_device": "/dev/dri/renderD128",
                  "vaapi_driver": "iHD"
                },
                "subtitle": { "mode": "burn" }
              }
            }
    controllers:
      ersatztv-next:
        containers:
          ersatztv-next:
            image:
              repository: ghcr.io/ersatztv/next
              tag: develop@sha256:2a4557c39c3a71af65bc7812af1b643082107a42311e56b4ec6f9dfb3b490740
            env:
              TZ: "${TIMEZONE}"
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
                gpu.intel.com/i915: 1
              limits:
                memory: 1Gi
                gpu.intel.com/i915: 1
          playout-generator:
            image:
              repository: ghcr.io/ersatztv/next
              tag: develop@sha256:2a4557c39c3a71af65bc7812af1b643082107a42311e56b4ec6f9dfb3b490740
            command: ["/bin/sh", "-c"]
            args:
              - |
                while true; do
                  /app/ersatztv-playout-generator --content-folder /data/video/musicvideos --output-folder /config/playout
                  sleep 86400
                done
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    service:
      ersatztv-next:
        controller: *name
        ports:
          http:
            port: &port 8409
    persistence:
      config:
        enabled: true
        existingClaim: ersatztv-next
        globalMounts:
          - path: /config
      lineup:
        enabled: true
        type: configMap
        name: ersatztv-next
        globalMounts:
          - path: /config/lineup.json
            subPath: lineup.json
            readOnly: true
      channel:
        enabled: true
        type: configMap
        name: ersatztv-next
        globalMounts:
          - path: /config/channels/1/channel.json
            subPath: channel.json
            readOnly: true
      # HLS output written to /tmp/hls by the server
      tmp:
        enabled: true
        type: emptyDir
      media:
        enabled: true
        existingClaim: media
        advancedMounts:
          ersatztv-next:
            ersatztv-next:
              - path: /data
                subPath: .
                readOnly: true
            playout-generator:
              - path: /data
                subPath: .
                readOnly: true
    networkpolicies:
      ersatztv-next:
        enabled: true
        controller: *name
        policyTypes:
          - Ingress
          - Egress
        rules:
          egress: []
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: jellyfin
                      app.kubernetes.io/instance: media-jellyfin
                      app.kubernetes.io/name: media-jellyfin
              ports:
                - port: *port

