---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome
  namespace: media
spec:
  storageClassName: "${STORAGE_READWRITEONCE}"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
