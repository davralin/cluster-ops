---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name navidrome
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: media
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostname: *name
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      navidrome:
        containers:
          navidrome:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: 0.61.1@sha256:1e1660054a856cc09f227d6929252e45a519fdb16004b464dd637f7294ca3ec1
            env:
              TZ: "${TIMEZONE}"
              ND_AUTOIMPORTPLAYLISTS: true
              ND_SCANNER_SCHEDULE: "@every 12h"
              ND_LOGLEVEL: debug
              ND_DATAFOLDER: /data/navidrome
              ND_MUSICFOLDER: /music
              ND_PROMETHEUS_ENABLED: true
              SQLITE_TMPDIR: /data/
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 600Mi
    service:
      navidrome:
        controller: *name
        ports:
          http:
            port: &port 4533
    serviceMonitor:
      navidrome:
        serviceName: navidrome
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    ingress:
      navidrome:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "navidrome.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: navidrome
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      data:
        enabled: true
        existingClaim: navidrome
      music:
        enabled: true
        existingClaim: media
        advancedMounts:
          navidrome:
            navidrome:
              - path: /music/artists
                subPath: audio/artists
                readOnly: true
              - path: /music/rip
                subPath: audio/rip
                readOnly: true
              - path: /music/singles
                subPath: audio/singles
                readOnly: true
              - path: /music/soundtracks
                subPath: audio/soundtracks
                readOnly: true
      tmp: # Error reading metadata from file. Skipping" error="init module: get runtime once: create directory /tmp/go-taglib-wasm: mkdir /tmp/go-taglib-wasm: read-only file system"
        enabled: true
        type: emptyDir
    networkpolicies:
      navidrome:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to: # It phones home apparently
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                  - "${HAPROXY_WHITELIST}"
              ports:
                - port: 443
                  protocol: TCP
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: spotisub
                      app.kubernetes.io/instance: media-spotisub
                      app.kubernetes.io/name: media-spotisub
              ports:
                - port: *port
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
              ports:
                - port: *port