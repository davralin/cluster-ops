---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name filebrowser
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: media
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      filebrowser:
        containers:
          filebrowser:
            image:
              repository: docker.io/filebrowser/filebrowser
              tag: v2.63.18@sha256:c4c627f687668c5a02ab410d8473712c77be7f1f0ea4f8d624d2a1392c495e76
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - NET_BIND_SERVICE
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
    service:
      filebrowser:
        controller: *name
        ports:
          http:
            port: &port 80
    ingress:
      filebrowser:
        enabled: true
        annotations:
          haproxy-ingress.github.io/allowlist-source-range: "${HAPROXY_WHITELIST}"
          haproxy-ingress.github.io/ssl-redirect: "true"
          haproxy-ingress.github.io/config-backend: |
            http-response set-header Strict-Transport-Security "max-age=31536000"
            http-response set-header X-Frame-Options DENY
            http-response set-header X-Content-Type-Options nosniff
            http-response set-header Referrer-Policy strict-origin-when-cross-origin
        hosts:
          - host: &host "filebrowser.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: filebrowser
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      data:
        enabled: true
        existingClaim: media
        globalMounts:
          - path: /srv
      config:
        enabled: true
        existingClaim: filebrowser
        advancedMounts:
          filebrowser:
            filebrowser:
              - path: /database
                subPath: database
              - path: /config
                subPath: config
    networkpolicies:
      filebrowser:
        enabled: true
        controller: *name
        policyTypes:
          - Ingress
          - Egress
        rules:
          egress: []
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: haproxy-ingress
              ports:
                - port: *port