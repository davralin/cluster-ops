---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name litellm
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: litellm
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/controller: litellm
              topologyKey: kubernetes.io/hostname
    controllers:
      litellm:
        replicas: 1
        podDisruptionBudget:
          minAvailable: 0
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          litellm:
            image:
              repository: ghcr.io/berriai/litellm-non_root
              tag: main-v1.81.9-stable@sha256:868fc4bf07e06f53681c838728edc81b9ecf871a741f807132bac1be5468f8a3
            args:
              - "--config"
              - "/config/config.yaml"
            env:
              DATABASE_HOST: litellm-postgres-v18-rw.litellm.svc.cluster.local
              DATABASE_PORT: "5432"
              DATABASE_NAME: litellm
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: litellm-basic-auth
                    key: username
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: litellm-basic-auth
                    key: password
              GITHUB_COPILOT_TOKEN_DIR: /data/copilot-tokens
              LITELLM_NON_ROOT: true
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secrets
                    key: master-key
              LITELLM_MIGRATION_DIR: /tmp/migration
              LITELLM_SALT_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secrets
                    key: salt-key
              USE_PRISMA_MIGRATE: true
              TZ: "${TIMEZONE}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: &port 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 1Gi
              limits:
                memory: 2Gi
    configMaps:
      config:
        data:
          config.yaml: |
            model_list:
              - model_name: "claude-opus-4.7"
                litellm_params:
                  model: "github_copilot/claude-opus-4.7"
              - model_name: "claude-opus-4.6"
                litellm_params:
                  model: "github_copilot/claude-opus-4.6"
              - model_name: "claude-sonnet-4.6"
                litellm_params:
                  model: "github_copilot/claude-sonnet-4.6"
              - model_name: claude-haiku-4.5
                litellm_params:
                  model: "github_copilot/claude-haiku-4.5"
            general_settings:
              #store_model_in_db: true
            litellm_settings:
              drop_params: true
              additional_drop_params: ["context_management"]
              callbacks:
                - prometheus
              model_list:
                timeout: 300
                stream_timeout: 30
              router_settings:
                timeout: 300
    service:
      litellm:
        controller: *name
        ports:
          http:
            port: *port
    serviceMonitor:
      metrics:
        enabled: true
        serviceName: *name
        endpoints:
          - port: http
            scheme: http
            path: /metrics/
            interval: 60s
            scrapeTimeout: 10s
    ingress:
      litellm:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "litellm.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: litellm
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      data:
        enabled: true
        existingClaim: litellm-rwo
      tmp:
        enabled: true
        type: emptyDir
      config:
        enabled: true
        type: configMap
        name: litellm
        globalMounts:
          - path: /config
    networkpolicies:
      litellm:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: litellm-postgres-v18
              ports:
                - port: 5432
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to: # GitHub Copilot APIs require external internet access
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                  - "${HAPROXY_WHITELIST}"
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: karakeep
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: karakeep
                      app.kubernetes.io/instance: karakeep-karakeep
                      app.kubernetes.io/name: karakeep-karakeep
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: openwebui
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: openwebui
                      app.kubernetes.io/instance: openwebui-openwebui
                      app.kubernetes.io/name: openwebui-openwebui
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: wallos
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: wallos
                      app.kubernetes.io/instance: wallos-wallos
                      app.kubernetes.io/name: wallos-wallos
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: hermes-agent
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: hermes-agent
                      app.kubernetes.io/instance: hermes-agent-hermes-agent
                      app.kubernetes.io/name: hermes-agent-hermes-agent
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: opencode
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: opencode
                      app.kubernetes.io/instance: opencode-opencode
                      app.kubernetes.io/name: opencode-opencode
              ports:
                - port: *port
