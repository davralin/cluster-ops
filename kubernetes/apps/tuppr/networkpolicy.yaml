---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: tuppr
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tuppr
  namespace: tuppr
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: tuppr-tuppr
      app.kubernetes.io/name: tuppr
  egress:
    - toEntities:
      - host
      - kube-apiserver