---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: tuppr
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-upgrade
  namespace: tuppr
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: kubernetes
      app.kubernetes.io/name: kubernetes-upgrade
      app.kubernetes.io/part-of: tuppr
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kubernetes-upgrade
  namespace: tuppr
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: kubernetes
      app.kubernetes.io/name: kubernetes-upgrade
      app.kubernetes.io/part-of: tuppr
  egress:
    - toEntities:
      - kube-apiserver
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tuppr
  namespace: tuppr
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: tuppr-tuppr
      app.kubernetes.io/name: tuppr
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tuppr
  namespace: tuppr
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: tuppr-tuppr
      app.kubernetes.io/name: tuppr
  egress:
    - toEntities:
      - host
      - kube-apiserver
  ingress:
    - fromEntities:
      - kube-apiserver
      - remote-node
      - host