---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr-talos-upgrade
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  targetNamespace: tuppr
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: tuppr
      namespace: flux-system
  values:
    resources:
      - apiVersion: tuppr.home-operations.com/v1alpha1
        kind: TalosUpgrade
        metadata:
          name: controlplane
          namespace: tuppr
        spec:
          talos:
            # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
            version: v1.12.6
          policy:
            rebootMode: powercycle
            stage: true
          maintenance:
            windows:
              - start: "13 10 * * 1-5" # At 10:13 on every weekday
                duration: "1h"
                timezone: "${TIMEZONE}"
          nodeSelector:
            matchExpressions:
              # Only control plane nodes for this specific plan
              - {key: node-role.kubernetes.io/control-plane, operator: Exists}
          healthChecks:
            - apiVersion: volsync.backube/v1alpha1
              kind: ReplicationSource
              expr: |-
                status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
            - apiVersion: ceph.rook.io/v1
              kind: CephCluster
              expr: |-
                status.ceph.health in ['HEALTH_OK']
      - apiVersion: tuppr.home-operations.com/v1alpha1
        kind: TalosUpgrade
        metadata:
          name: worker
          namespace: tuppr
        spec:
          talos:
            # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
            version: v1.12.6
          policy:
            rebootMode: powercycle
            stage: true
          maintenance:
            windows:
              - start: "13 11 * * 1-5" # At 11:13 on every weekday
                duration: "1h"
                timezone: "${TIMEZONE}"
          nodeSelector:
            matchExpressions:
              # Exclude control plane nodes from this specific plan
              - {key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}
          healthChecks:
            - apiVersion: volsync.backube/v1alpha1
              kind: ReplicationSource
              expr: |-
                status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
            - apiVersion: ceph.rook.io/v1
              kind: CephCluster
              expr: |-
                status.ceph.health in ['HEALTH_OK']
