---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name infiscal-postgres-v18
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: &namespace infiscal
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: plugin-barman-cloud
      namespace: flux-system
  values:
    resources:
      - apiVersion: barmancloud.cnpg.io/v1
        kind: ObjectStore
        metadata:
          name: *name
          namespace: *namespace
        spec:
          retentionPolicy: 7d
          configuration:
            destinationPath: s3://postgresql-${CLUSTER_NAME}
            endpointURL: "${SECRET_S3_CNPG_URL}"
            s3Credentials:
              accessKeyId:
                name: *name
                key: s3-access-key
              secretAccessKey:
                name: *name
                key: s3-secret-key
              region:
                name: *name
                key: region
            wal:
              compression: bzip2
              maxParallel: 4
      - apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: *name
          namespace: *namespace
        spec:
          instances: 2
          affinity:
            enablePodAntiAffinity: true
            topologyKey: kubernetes.io/hostname
            podAntiAffinityType: required
          imageName: ghcr.io/cloudnative-pg/postgresql:18.4
          primaryUpdateStrategy: unsupervised
          storage:
            size: 2Gi
            storageClass: "${STORAGE_READWRITEONCE}"
          walStorage:
            size: 1Gi
            storageClass: "${STORAGE_READWRITEONCE}"
          managed:
            roles:
              - name: infiscal
                login: true
                passwordSecret:
                  name: infiscal-basic-auth
          superuserSecret:
            name: *name
          bootstrap:
            initdb:
              database: infiscal
              owner: infiscal
              secret:
                name: infiscal-basic-auth
          monitoring:
            enablePodMonitor: "${MONITORING_PROMETHEUS}"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              memory: "1Gi"
          plugins:
            - name: barman-cloud.cloudnative-pg.io
              isWALArchiver: true
              parameters:
                barmanObjectName: *name
          externalClusters:
            - name: *name
              plugin:
                name: barman-cloud.cloudnative-pg.io
                parameters:
                  barmanObjectName: *name
                  serverName: *name
      - apiVersion: postgresql.cnpg.io/v1
        kind: ScheduledBackup
        metadata:
          name: *name
          namespace: *namespace
        spec:
          schedule: "0 17 01 * * *"
          immediate: true
          backupOwnerReference: self
          method: plugin
          pluginConfiguration:
            name: barman-cloud.cloudnative-pg.io
          cluster:
            name: *name
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: *name
          namespace: *namespace
        spec:
          podSelector:
            matchLabels:
              cnpg.io/cluster: *name
          policyTypes:
            - Ingress
            - Egress
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
                - podSelector:
                    matchLabels:
                      component: "infisical"
                      app: infisical-standalone
                      release: infiscal
              ports:
                - port: 5432
                  protocol: TCP
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: cloudnative-pg
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: cloudnative-pg
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
              ports:
                - port: 8000
                  protocol: TCP
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
              ports:
                - port: 9187
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
              ports:
                - port: 5432
                  protocol: TCP
                - port: 8000
                  protocol: TCP
            - to: # S3-Backup
              - ipBlock:
                  cidr: 10.0.1.75/32
              ports:
                - port: 3900
                  protocol: TCP
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: *name
          namespace: *namespace
        spec:
          endpointSelector:
            matchLabels:
              cnpg.io/cluster: *name
          egress:
            - toEntities:
              - kube-apiserver
              toPorts:
              - ports:
                - port: "6443"
                  protocol: TCP
