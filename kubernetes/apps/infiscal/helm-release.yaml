---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name infiscal
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: infiscal
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: infiscal
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: infiscal-valkey
      namespace: flux-system
    - name: infiscal-postgres-v18
      namespace: flux-system
  values:
    infisical:
      replicaCount: 2
      image:
        repository: infisical/infisical
        tag: "v0.160.7"
        pullPolicy: IfNotPresent
      kubeSecretRef: infisical-secrets
      resources:
        limits:
          memory: 1000Mi
        requests:
          cpu: 350m

    ingress:
      enabled: true
      hostName: &host "infiscal.${SECRET_DEFAULT_DOMAIN}"
      ingressClassName: haproxy
      nginx:
        enabled: false
      annotations:
        haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
        haproxy.org/ssl-redirect-port: "443"
        haproxy.org/response-set-header: |
          Strict-Transport-Security "max-age=31536000"
          X-Frame-Options "DENY"
          X-Content-Type-Options "nosniff"
          Referrer-Policy "strict-origin-when-cross-origin"
      tls:
        - hosts:
            - *host
          secretName: "${SECRET_DEFAULT_DOMAIN_CERT}"

    postgresql:
      enabled: false

    redis:
      enabled: false
