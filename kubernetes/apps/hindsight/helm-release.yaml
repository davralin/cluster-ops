---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hindsight
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: hindsight
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: hindsight
  install:
    createNamespace: true
    timeout: 10m
    remediation:
      retries: 10
  upgrade:
    timeout: 10m
    remediation:
      retries: 10
  dependsOn:
    - name: hindsight-postgres-v18
      namespace: flux-system
  values:
    existingSecret: hindsight-secrets

    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL

    postgresql:
      enabled: false
      external:
        host: hindsight-postgres-v18-rw.hindsight.svc.cluster.local
        port: 5432
        database: hindsight
        username: hindsight

    api:
      enabled: true
      replicaCount: 1
      livenessProbe:
        initialDelaySeconds: 120
      resources:
        requests:
          cpu: 50m
          memory: 1Gi
        limits:
          memory: 2Gi
      env:
        HINDSIGHT_API_LLM_PROVIDER: "openai"
        HINDSIGHT_API_LLM_MODEL: "claude-haiku-4.5"
        HINDSIGHT_API_LLM_BASE_URL: "http://litellm.litellm.svc.cluster.local:4000"
        HINDSIGHT_API_WORKER_ID: "hindsight-prod"
      extraVolumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /home/hindsight/.cache
      extraVolumes:
        - name: tmp
          emptyDir:
            medium: Memory
        - name: cache
          emptyDir: {}

    controlPlane:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 256Mi

    worker:
      enabled: false

    tei:
      reranker:
        enabled: false
      embedding:
        enabled: false

    ingress:
      enabled: true
      className: haproxy
      annotations:
        haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
        haproxy.org/ssl-redirect-port: "443"
        haproxy.org/response-set-header: |
          Strict-Transport-Security "max-age=31536000"
          X-Frame-Options "DENY"
          X-Content-Type-Options "nosniff"
          Referrer-Policy "strict-origin-when-cross-origin"
      hosts:
        - host: &host "hindsight.${SECRET_DEFAULT_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
              service: controlPlane
            - path: /api
              pathType: Prefix
              service: api
      tls:
        - hosts:
            - *host
