---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: hindsight
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hindsight-api
  namespace: hindsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hindsight
      app.kubernetes.io/instance: hindsight-hindsight
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: haproxy-controller
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-ingress
      ports:
        - port: 8888
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: hermes-agent
          podSelector:
            matchLabels:
              app.kubernetes.io/controller: hermes-agent
              app.kubernetes.io/instance: hermes-agent-hermes-agent
              app.kubernetes.io/name: hermes-agent-hermes-agent
      ports:
        - port: 8888
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hindsight
              app.kubernetes.io/instance: hindsight-hindsight
              app.kubernetes.io/component: control-plane
      ports:
        - port: 8888
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: hindsight-postgres-v18
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
          podSelector:
            matchLabels:
              app.kubernetes.io/controller: litellm
              app.kubernetes.io/instance: litellm-litellm
              app.kubernetes.io/name: litellm-litellm
      ports:
        - port: 4000
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - "${HAPROXY_WHITELIST}"
      ports:
        - port: 443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hindsight-control-plane
  namespace: hindsight
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hindsight
      app.kubernetes.io/instance: hindsight-hindsight
      app.kubernetes.io/component: control-plane
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: haproxy-controller
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-ingress
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hindsight
              app.kubernetes.io/instance: hindsight-hindsight
              app.kubernetes.io/component: api
      ports:
        - port: 8888
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
