---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name manifest
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: manifest
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: manifest-postgres-v18
      namespace: flux-system
  values:
    fullnameOverride: *name
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      manifest:
        containers:
          manifest:
            image:
              repository: docker.io/manifestdotbuild/manifest
              tag: 6.12.0@sha256:7b23918fe990a99164f23ab21b05d60f5de5f1102e15516ec068d725b583ca26
            env:
              BETTER_AUTH_URL: "https://manifest.${SECRET_DEFAULT_DOMAIN}"
              MANIFEST_TELEMETRY_DISABLED: "1"
              BETTER_AUTH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: manifest-secrets
                    key: better-auth-secret
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: manifest-secrets
                    key: database-url
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: &port 3001
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      manifest:
        controller: *name
        ports:
          http:
            port: *port
    ingress:
      manifest:
        enabled: true
        annotations:
          haproxy.org/allow-list: "${HAPROXY_WHITELIST}"
          haproxy.org/ssl-redirect-port: "443"
          haproxy.org/response-set-header: |
            Strict-Transport-Security "max-age=31536000"
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
        hosts:
          - host: &host "manifest.${SECRET_DEFAULT_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: manifest
                  port: http
        tls:
          - hosts:
              - *host
    networkpolicies:
      manifest:
        enabled: true
        controller: *name
        policyTypes:
          - Egress
          - Ingress
        rules:
          egress:
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: manifest-postgres-v18
              ports:
                - port: 5432
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
            - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                  - "${HAPROXY_WHITELIST}"
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: haproxy-controller
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-ingress
              ports:
                - port: *port
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: hermes-agent
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: hermes-agent
                      app.kubernetes.io/instance: hermes-agent-hermes-agent
                      app.kubernetes.io/name: hermes-agent-hermes-agent
              ports:
                - port: *port
                  protocol: TCP
