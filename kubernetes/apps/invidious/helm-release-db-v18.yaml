---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name invidious-postgres-v18
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 30m
  driftDetection:
    mode: enabled
  targetNamespace: &namespace invidious
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: cloudnative-pg
      namespace: flux-system
  values:
    resources:
      - apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: *name
          namespace: *namespace
        spec:
          # using only 1 replica: very difficult to drain the node where postgres is running
          # using more than 1 replica: write amplification issues when leveraging replicated storage (e.g. ceph)
          instances: 2
          imageName: ghcr.io/cloudnative-pg/postgresql:18.3
          primaryUpdateStrategy: unsupervised
          storage:
            size: 2Gi
            storageClass: "${STORAGE_READWRITEONCE}"
          walStorage:
            size: 1Gi
            storageClass: "${STORAGE_READWRITEONCE}"
          managed:
            roles:
              - name: kemal
                login: true
          superuserSecret:
            name: *name
          bootstrap:
            # use this to start a new cluster
            initdb:
              database: invidious
              owner: kemal
              secret:
                name: invidious-basic-auth
            # use this to recover a net-new cluster from a backup
            #recovery:
            #  source: *name
            #  database: invidious
            #  owner: kemal
            # # use this to 'migrate' from an existing cnpg cluster (e.g. "invidious-postgres-v17") to the new cluster
            # initdb:
            #   import:
            #     type: monolith
            #     databases:
            #       - "*"
            #     roles:
            #       - "*"
            #     source:
            #       externalCluster: invidious-postgres-v17
          monitoring:
            enablePodMonitor: "${MONITORING_PROMETHEUS}"
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: *name
          namespace: *namespace
        spec:
          podSelector:
            matchLabels:
              cnpg.io/cluster: *name
          policyTypes:
            - Ingress
            - Egress
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
                - podSelector:
                    matchLabels:
                      cnpg.io/jobRole: import
                      app.kubernetes.io/name: postgresql
                      app.kubernetes.io/component: database
                      app.kubernetes.io/managed-by: cloudnative-pg
                - podSelector:
                    matchLabels:
                      app.kubernetes.io/controller: invidious
                      app.kubernetes.io/instance: invidious-invidious
                      app.kubernetes.io/name: invidious-invidious
              ports:
                - port: 5432
                  protocol: TCP
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: cloudnative-pg
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: cloudnative-pg
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
              ports:
                - port: 8000
                  protocol: TCP
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
              ports:
                - port: 9187
          egress:
            - to:
                - podSelector:
                    matchLabels:
                      cnpg.io/cluster: *name
              ports:
                - port: 5432
                  protocol: TCP
                - port: 8000
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                  podSelector:
                    matchLabels:
                      k8s-app: kube-dns
              ports:
                - port: 53
                  protocol: UDP
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: *name
          namespace: *namespace
        spec:
          endpointSelector:
            matchLabels:
              cnpg.io/cluster: *name
          egress:
            - toEntities:
              - kube-apiserver
              toPorts:
              - ports:
                - port: "6443"
                  protocol: TCP