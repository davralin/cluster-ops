---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name cloudnative-pg
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *name
  driftDetection:
    mode: enabled
  targetNamespace: cloudnative-pg
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    crds:
      create: true
    monitoring:
      grafanaDashboard:
        create: "${MONITORING_PROMETHEUS}"
    config:
      data:
        CLUSTERS_ROLLOUT_DELAY: '120'
        INSTANCES_ROLLOUT_DELAY: '20'