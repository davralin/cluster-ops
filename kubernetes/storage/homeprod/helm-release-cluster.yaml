---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: flux-system
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: rook-ceph-cluster
      version: v1.20.0
      sourceRef:
        kind: HelmRepository
        name: rook-ceph-charts
        namespace: flux-system
      interval: 30m
  targetNamespace: rook-ceph
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  dependsOn:
    - name: rook-ceph
      namespace: flux-system
    - name: ceph-csi-drivers
      namespace: flux-system
  values:
    clusterName: "${CLUSTER_NAME}"
    toolbox:
      enabled: true
    monitoring:
      enabled: "${MONITORING_PROMETHEUS}"
      createPrometheusRules: "${MONITORING_PROMETHEUS}"
    cephClusterSpec:
      cephConfig:
        global:
          mon_data_avail_warn: "10"
          # https://github.com/rook/rook/discussions/15403
          bdev_enable_discard: "true"
          bdev_async_discard_threads: "1"
      cleanupPolicy:
        wipeDevicesFromOtherClusters: false
      crashCollector:
        disable: false
      dashboard:
        enabled: false
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
      network:
        connections:
          requireMsgr2: true
      resources:
        osd:
          requests:
            cpu: 500m
          #limits:
          #  memory: 8Gi # Required for bootstrap
        mon:
          requests:
            cpu: 500m
      storage:
        useAllNodes: false
        useAllDevices: false
        config:
          encryptedDevice: "true"
          osdsPerDevice: "1"
        nodes:
          - name: aviendha
            devices:
              - name: /dev/disk/by-partlabel/r-nvme-osd
              - name: /dev/disk/by-id/ata-Samsung_SSD_870_QVO_8TB_S5SSNF0W507912Z
          - name: elayne
            devices:
              - name: /dev/disk/by-partlabel/r-nvme-osd
              - name: /dev/disk/by-id/ata-Samsung_SSD_870_QVO_8TB_S5SSNF0W507918V
          - name: mat
            devices:
              - name: /dev/disk/by-partlabel/r-nvme-osd
              - name: /dev/disk/by-id/ata-Samsung_SSD_870_QVO_4TB_S5STNF0T308086D
          - name: min
            devices:
              - name: /dev/disk/by-partlabel/r-nvme-osd
              - name: /dev/disk/by-id/ata-Samsung_SSD_870_QVO_4TB_S5STNF0T308094T
          - name: rand
            devices:
              - name: /dev/disk/by-partlabel/r-nvme-osd
              - name: /dev/disk/by-id/ata-Samsung_SSD_870_QVO_4TB_S5STNF0T205013V
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          enableCrushUpdates: true
          deviceClass: nvme
          failureDomain: host
          replicated:
            size: 3
            requireSafeReplicaSize: true
        storageClass:
          enabled: true
          name: ceph-block
          allowVolumeExpansion: true
          isDefault: true
          mountOptions:
            - discard
          parameters:
            compression_algorithm: zstd
            compression_mode: passive
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            imageFeatures: deep-flatten,exclusive-lock,fast-diff,layering,object-map
            imageFormat: "2"
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      deletionPolicy: Delete
      isDefault: true
    cephFileSystems:
      - name: ceph-filesystem
        spec:
          metadataPool:
            enableCrushUpdates: true
            deviceClass: nvme
            replicated:
              size: 2
              requireSafeReplicaSize: true
          dataPools:
            - failureDomain: host
              replicated:
                size: 2
                requireSafeReplicaSize: true
          metadataServer:
            activeCount: 1
            activeStandby: true
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: ceph-filesystem
            priorityClassName: system-cluster-critical
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
        storageClass:
          enabled: true
          name: ceph-filesystem
          allowVolumeExpansion: true
          isDefault: false
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      deletionPolicy: Delete
      isDefault: false
    cephObjectStores: []
