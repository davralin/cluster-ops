name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:{{ immich_version }}
    volumes:
      - ${EXTERNAL_PATH}:/usr/src/app/external:ro
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - "{{ immich_compose_ip_binding_web }}:2283"
    depends_on:
      - redis
      - database
    restart: always

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:{{ immich_version }}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always

  redis:
    container_name: immich_redis
    # renovate: datasource=docker depName=docker.io/valkey/valkey
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    # renovate: datasource=docker depName=ghcr.io/immich-app/postgres
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3@sha256:f3028f313a766e48fed94f077fb19a8718c5cc673cb00d51a038fdce480d670a
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql
    shm_size: 128mb
    restart: always

  immich-folder-album-creator:
    container_name: immich_folder_album_creator
    image: ghcr.io/salvoxia/immich-folder-album-creator:{{ immich_compose_folder_album_creator_version }}
    restart: unless-stopped
    environment:
      API_URL: http://immich_server:2283/api
      API_KEY: "{{ immich_compose_folder_album_creator_api_key }}"
      ROOT_PATH: /usr/src/app/external
      SYNC_MODE: "1"
      CRON_EXPRESSION: "40 * * * *"
      TZ: Europe/Oslo
      RUN_IMMEDIATELY: "true"
    depends_on:
      - immich-server

volumes:
  model-cache:
