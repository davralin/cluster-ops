---

services:
  uptime-kuma:
    image: ghcr.io/louislam/uptime-kuma:2.3.2@sha256:9aeb4e51d038047f414309c77a1af553281ca535723cb88907d907269d0a908e
    ports:
      - "{{ uptime_kuma_compose_web_port }}:3001"
    volumes:
      - "{{ uptime_kuma_compose_config_path }}:/app/data"
    environment:
      TZ: "Europe/Oslo"
    restart: always
  cloudflared:
    image: mirror.gcr.io/cloudflare/cloudflared:2026.5.1@sha256:a5b5e6fd9a372f054b9a843c219bfbcdceb54691605312a8b1ee72978bdf1aa1
    command: tunnel --no-autoupdate run --token "{{ cloudflared_token }}"
    restart: always
    depends_on:
      - uptime-kuma
