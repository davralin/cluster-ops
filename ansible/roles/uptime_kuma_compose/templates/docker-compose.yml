---

services:
  uptime-kuma:
    image: ghcr.io/louislam/uptime-kuma:2.3.0@sha256:a8e5e69ce185d5425fcbf2ab14ddf808df5651fb2747a46a17cecf8ed5fd1af2
    ports:
      - "{{ uptime_kuma_compose_web_port }}:3001"
    volumes:
      - "{{ uptime_kuma_compose_config_path }}:/app/data"
    environment:
      TZ: "Europe/Oslo"
    restart: always
  cloudflared:
    image: docker.io/cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    command: tunnel --no-autoupdate run --token "{{ cloudflared_token }}"
    restart: always
    depends_on:
      - uptime-kuma